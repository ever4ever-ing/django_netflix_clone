{% extends 'base.html' %}

{% block title %}
Netflix - Movie
{% endblock title %}

{% block content %}

    {% include 'partials/navbar.html' %}
    <main class='bg-primary_black h-full w-full '>

        {{ movie|json_script:"movie_data" }}
        
        <video  controls class="w-full h-screen player"></video>
        
    </main>
    <script>
        const videoEl = document.querySelector('video')
        const movie_data = JSON.parse(document.getElementById('movie_data').textContent);

        const url = new URL(location.href)
        const epiParam = Number.parseInt(url.searchParams.get("epi"), 10)
        const videoParam = Number.isNaN(epiParam) ? 0 : epiParam

        if (!Array.isArray(movie_data) || movie_data.length === 0) {
            console.error('No videos are attached to this movie.')
        } else {
            const safeIndex = videoParam >= 0 && videoParam < movie_data.length ? videoParam : 0
            const filePath = movie_data[safeIndex].file
            videoEl.setAttribute('src', `${location.origin}/media/${filePath}`)
        }
    </script>
{% endblock content %}
